before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

snapshot:
  name_template: "{{ incpatch .Version }}-next"

nfpms:
  - id: guardrail
    vendor: Ifeoluwashola Adaralegbe
    homepage: https://github.com/ifeoluwashola/guardrail
    maintainer: Ifeoluwashola Adaralegbe <[EMAIL_ADDRESS]>
    description: Context-aware Go CLI designed to safely manage environment switching and prevent accidental production command execution.
    license: MIT
    formats:
      - deb
      - rpm
      - apk
    bindir: /usr/bin

brews:
  - name: guardrail
    repository:
      owner: ifeoluwashola
      name: homebrew-tap
      token: "{{ .Env.GITHUB_TOKEN }}"
    directory: Formula
    homepage: https://github.com/ifeoluwashola/guardrail
    description: Context-aware CLI preventing accidental production commands.
    license: MIT
    test: |
      system "#{bin}/guardrail --help"

scoops:
  - repository:
      owner: ifeoluwashola
      name: scoop-bucket
      token: "{{ .Env.GITHUB_TOKEN }}"
    directory: bucket
    homepage: https://github.com/ifeoluwashola/guardrail
    description: Context-aware CLI preventing accidental production commands.
    license: MIT
